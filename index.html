<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;

    --accent: #f97316;
    --accent2: #38bdf8;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);

  .content { padding: 28px; flex: 1; }

  /* SIDEBAR */
  .logo {
    padding: 20px 20px 12px; border-bottom: 1px solid var(--border);
  }
  .logo-title { font-family: var(--font-head); font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
  .nav { padding: 12px 10px; flex: 1; }
  .nav-item {

    cursor: pointer; color: var(--muted); font-size: 13.5px; font-weight: 500;

  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(249,115,22,0.15); color: var(--accent); }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .nav-section { font-size: 10px; color: var(--muted); font-family: var(--font-mono); padding: 14px 12px 6px; letter-spacing: 1px; }

  /* TOPBAR */
  .page-title { font-family: var(--font-head); font-size: 20px; font-weight: 800; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .badge { background: var(--accent); color: white; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .time-display { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

  /* CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
  }
  .kpi-card.blue::before { background: var(--accent2); }
  .kpi-card.green::before { background: var(--success); }
  .kpi-card.red::before { background: var(--danger); }
  .kpi-card.yellow::before { background: var(--warning); }
  .kpi-label { font-size: 11px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-head); font-size: 30px; font-weight: 800; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* TABLES */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: gap; gap: 10px; }
  .table-title { font-family: var(--font-head); font-size: 15px; font-weight: 700; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); font-size: 11px; font-family: var(--font-mono); color: var(--muted); padding: 10px 16px; text-align: left; letter-spacing: 0.5px; }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    font-family: var(--font-mono); font-weight: 500;
  }
  .tag-ok { background: rgba(34,197,94,0.15); color: var(--success); }
  .tag-low { background: rgba(234,179,8,0.15); color: var(--warning); }
  .tag-critical { background: rgba(239,68,68,0.15); color: var(--danger); }
  .tag-in { background: rgba(56,189,248,0.15); color: var(--accent2); }
  .tag-out { background: rgba(249,115,22,0.15); color: var(--accent); }
  .tag-transfer { background: rgba(168,85,247,0.15); color: #a855f7; }

  /* FORMS */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .form-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
  input, select, textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-body); font-size: 13px; padding: 10px 12px;
    outline: none; transition: border 0.15s; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-family: var(--font-body); font-size: 13px; font-weight: 600; transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #ea6c0a; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
  .alert-info { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3); color: var(--accent2); }

  /* SEARCH */
  .search-bar { display: flex; gap: 10px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 180px; }

  /* FILTERS */
  .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); }
  .page-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .page-btn.active { background: var(--accent); border-color: var(--accent); }
  .page-info { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }

  /* LOADING */
  .loader { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--muted); font-family: var(--font-mono); font-size: 13px; gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

  /* STOCK INFO BOX */
  .stock-info { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 10px; }
  .stock-info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }

// ── PAGE: MOVIMIENTOS ─────────────────────────────────────────────────────────
let movPage = 1; const movPerPage = 20;
async function pageMovimientos(page = 1, tipo = '') {
  movPage = page;
  let query = sb.from('movimientos').select('*', { count: 'exact' });
  if (tipo) query = query.eq('tipo', tipo);
  const from = (page - 1) * movPerPage;
  query = query.order('created_at', { ascending: false }).range(from, from + movPerPage - 1);
  const { data, count } = await query;

  const rows = data && data.length ? data.map(m => {
    const tag = m.tipo === 'ENTRADA' ? 'tag-in' : m.tipo === 'SALIDA' ? 'tag-out' : 'tag-transfer';
    return `<tr>
      <td style="font-size:12px;white-space:nowrap">${fmtDate(m.created_at)}</td>
      <td><span class="tag ${tag}">${m.tipo}</span></td>
      <td style="font-family:var(--font-mono);font-size:12px;color:var(--accent2)">${m.codigo||'—'}</td>
      <td style="max-width:280px;font-size:13px">${m.descripcion||'—'}</td>
      <td style="font-weight:700;text-align:center">${m.cantidad}</td>
      <td style="font-size:12px;color:var(--muted)">${m.referencia||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${m.solicitante||m.proveedor||'—'}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="7" class="empty">Sin movimientos registrados</td></tr>';

  const totalPages = Math.ceil((count || 0) / movPerPage);
  const pgs = [];
  for (let p = Math.max(1, page - 2); p <= Math.min(totalPages, page + 2); p++)
    pgs.push(`<button class="page-btn ${p===page?'active':''}" onclick="pageMovimientos(${p},'${tipo}')">${p}</button>`);

  setContent(`
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">📋 Historial de Movimientos <span style="color:var(--muted);font-weight:400;font-size:13px">${count||0} registros</span></span>
        <div class="filter-row">
          <select onchange="pageMovimientos(1,this.value)" style="width:160px">
            <option value="" ${!tipo?'selected':''}>Todos los tipos</option>
            <option value="ENTRADA" ${tipo==='ENTRADA'?'selected':''}>Entradas</option>
            <option value="SALIDA" ${tipo==='SALIDA'?'selected':''}>Salidas</option>
            <option value="TRANSFERENCIA" ${tipo==='TRANSFERENCIA'?'selected':''}>Transferencias</option>
          </select>
        </div>
      </div>
      <table>
        <thead><tr><th>FECHA</th><th>TIPO</th><th>CÓDIGO</th><th>DESCRIPCIÓN</th><th>CANT.</th><th>REFERENCIA</th><th>PERSONA</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="pagination">
        ${page>1?`<button class="page-btn" onclick="pageMovimientos(${page-1},'${tipo}')">‹</button>`:''}
        ${pgs.join('')}
        ${page<totalPages?`<button class="page-btn" onclick="pageMovimientos(${page+1},'${tipo}')">›</button>`:''}
        <span class="page-info">Página ${page} de ${totalPages}</span>
      </div>
    </div>
  `);
}

// ── PAGE: KPIs ────────────────────────────────────────────────────────────────
async function pageKpis() {
  const [{ data: items }, { count: totalMovs }, { count: entradas }, { count: salidas }] = await Promise.all([
    sb.from('inventario').select('*'),
    sb.from('movimientos').select('*', { count: 'exact', head: true }),
    sb.from('movimientos').select('*', { count: 'exact', head: true }).eq('tipo', 'ENTRADA'),
    sb.from('movimientos').select('*', { count: 'exact', head: true }).eq('tipo', 'SALIDA')
  ]);

  const total = items ? items.length : 0;
  const conStock = items ? items.filter(i => (i.stock_bodega || 0) > 0).length : 0;
  const exactitud = total ? Math.round((conStock / total) * 100) : 0;
  const sinStock = total - conStock;
  const fillRate = total ? Math.round((conStock / total) * 100) : 0;

  // Category breakdown
  const cats = {};
  (items || []).forEach(i => {
    const c = i.categoria || 'Sin categoría';
    if (!cats[c]) cats[c] = { total: 0, conStock: 0, stock: 0 };
    cats[c].total++;
    cats[c].stock += (i.stock_bodega || 0) + (i.stock_operativo || 0);
    if ((i.stock_bodega || 0) > 0) cats[c].conStock++;
  });

  const catRows = Object.entries(cats).sort((a, b) => b[1].stock - a[1].stock).map(([cat, v]) => {
    const pct = Math.round((v.conStock / v.total) * 100);
    const bar = `<div style="background:var(--surface2);border-radius:4px;height:6px;width:100%;margin-top:4px"><div style="background:${pct>70?'var(--success)':pct>40?'var(--warning)':'var(--danger)'};height:100%;width:${pct}%;border-radius:4px"></div></div>`;
    return `<tr>
      <td>${cat}</td>
      <td style="text-align:center">${v.total}</td>
      <td style="text-align:center">${v.conStock}</td>
      <td style="text-align:center;color:var(--danger)">${v.total - v.conStock}</td>
      <td style="text-align:center;font-weight:700">${v.stock.toLocaleString()}</td>
      <td style="min-width:120px"><div style="font-size:11px;color:var(--muted)">${pct}%</div>${bar}</td>
    </tr>`;
  }).join('');

  setContent(`
    <div class="kpi-grid">
      <div class="kpi-card green">
        <div class="kpi-label">EXACTITUD INVENTARIO</div>
        <div class="kpi-value">${exactitud}%</div>
        <div class="kpi-sub">${conStock} de ${total} ítems con stock</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">FILL RATE</div>
        <div class="kpi-value">${fillRate}%</div>
        <div class="kpi-sub">Disponibilidad general</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">QUIEBRES DE STOCK</div>
        <div class="kpi-value">${sinStock}</div>
        <div class="kpi-sub">Ítems sin disponibilidad</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">TOTAL MOVIMIENTOS</div>
        <div class="kpi-value">${totalMovs || 0}</div>
        <div class="kpi-sub">Entradas: ${entradas||0} · Salidas: ${salidas||0}</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header"><span class="table-title">📊 Disponibilidad por Categoría</span></div>
      <table>
        <thead><tr><th>CATEGORÍA</th><th style="text-align:center">TOTAL</th><th style="text-align:center">CON STOCK</th><th style="text-align:center">SIN STOCK</th><th style="text-align:center">UNIDADES</th><th>DISPONIBILIDAD</th></tr></thead>
        <tbody>${catRows}</tbody>
      </table>
    </div>
  `);
}

};
